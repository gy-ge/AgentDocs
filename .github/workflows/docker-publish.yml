name: docker-publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish, for example 0.1.1-manual
        required: true
        type: string
      publish_latest:
        description: Also update the latest tag
        required: false
        default: false
        type: boolean

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Run test suite
        run: uv run pytest

  docker-validate:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for validation
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  docker-publish:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    outputs:
      image_name: ${{ steps.image.outputs.name }}
      image_digest: ${{ steps.build.outputs.digest }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && inputs.publish_latest }}

      - name: Build and publish image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Verify published platforms
        if: github.event_name != 'pull_request'
        run: |
          docker buildx imagetools inspect ${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}

  docker-smoke-test:
    runs-on: ubuntu-latest
    needs: docker-publish
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published image by digest
        run: |
          docker pull ${{ needs.docker-publish.outputs.image_name }}@${{ needs.docker-publish.outputs.image_digest }}

      - name: Start published image
        run: |
          docker run -d --name agentdocs-smoke -p 18000:8000 ${{ needs.docker-publish.outputs.image_name }}@${{ needs.docker-publish.outputs.image_digest }}

      - name: Verify application responds
        shell: bash
        run: |
          for attempt in {1..20}; do
            if curl -fsS http://127.0.0.1:18000/ > /tmp/agentdocs-home.html; then
              grep -q "AgentDocs" /tmp/agentdocs-home.html
              exit 0
            fi
            sleep 3
          done
          echo "Application did not become ready in time" >&2
          docker logs agentdocs-smoke >&2 || true
          exit 1

      - name: Stop smoke test container
        if: always()
        run: |
          docker rm -f agentdocs-smoke