<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgentDocs</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fa;
        --panel: #ffffff;
        --panel-soft: #f6f8fa;
        --line: #d0d7de;
        --line-strong: #8c959f;
        --text: #1f2328;
        --muted: #59636e;
        --accent: #24292f;
        --success: #1a7f37;
        --warning: #9a6700;
        --danger: #cf222e;
        --shadow: 0 1px 2px rgba(31, 35, 40, 0.08);
        --radius: 12px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI Variable", "Segoe UI", "PingFang SC", sans-serif;
      }

      button,
      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #ffffff;
        color: var(--text);
        font: inherit;
      }

      button,
      input,
      select {
        min-height: 40px;
        padding: 0 12px;
      }

      textarea {
        min-height: 140px;
        padding: 12px;
        resize: vertical;
        line-height: 1.6;
      }

      input:focus,
      textarea:focus,
      select:focus,
      button:focus,
      details summary:focus {
        outline: 2px solid rgba(36, 41, 47, 0.16);
        outline-offset: 1px;
      }

      button {
        cursor: pointer;
      }

      button:hover:not(:disabled) {
        background: var(--panel-soft);
      }

      button:disabled {
        opacity: 0.55;
        cursor: default;
      }

      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #ffffff;
      }

      button.primary:hover:not(:disabled) {
        background: #111418;
      }

      button.secondary {
        background: var(--panel-soft);
      }

      button.warn {
        background: #fff8c5;
        border-color: #d4a72c;
        color: #5a4600;
      }

      button.danger {
        border-color: rgba(207, 34, 46, 0.36);
        color: var(--danger);
        background: rgba(207, 34, 46, 0.05);
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        font-weight: 600;
      }

      .app-shell {
        min-height: 100vh;
        padding: 24px;
      }

      .app-frame {
        max-width: 1560px;
        margin: 0 auto;
      }

      .app-header,
      .panel-header,
      .section-header,
      .inline-actions,
      .stack,
      .doc-toolbar,
      .task-actions,
      .modal-actions,
      .doc-switcher {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .stack {
        flex-direction: column;
        align-items: stretch;
      }

      .app-header,
      .panel-header,
      .section-header {
        justify-content: space-between;
      }

      .brand h1,
      .section-title h2,
      .section-title h3,
      .section-title h4 {
        margin: 0;
      }

      .brand h1 {
        font-size: 28px;
        line-height: 1.08;
      }

      .brand p,
      .section-title p,
      .hint,
      .meta {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .workspace {
        display: grid;
        grid-template-columns: 340px minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .sidebar,
      .editor-column {
        display: grid;
        gap: 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      .panel-body {
        padding: 18px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 28px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel-soft);
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      .status {
        margin: 16px 0;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel);
        color: var(--muted);
      }

      .status.success {
        border-color: rgba(26, 127, 55, 0.25);
        background: rgba(26, 127, 55, 0.06);
        color: var(--success);
      }

      .status.error {
        border-color: rgba(207, 34, 46, 0.25);
        background: rgba(207, 34, 46, 0.06);
        color: var(--danger);
      }

      .version-list {
        display: grid;
        gap: 10px;
        overflow: auto;
      }

      .version-list {
        max-height: 280px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel);
        padding: 12px;
        text-align: left;
      }

      .card h4,
      .card p {
        margin: 0;
      }

      .doc-toolbar button,
      .task-actions button,
      .inline-actions button,
      .modal-actions button,
      .doc-switcher button {
        width: auto;
      }

      .doc-toolbar .pill {
        margin-right: auto;
      }

      .doc-switcher {
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) minmax(180px, 1fr) auto;
        gap: 10px;
        align-items: center;
      }

      .doc-switcher > * {
        min-width: 0;
      }

      .doc-switcher .doc-switcher-actions {
        justify-content: flex-end;
      }

      .task-composer-grid {
        display: grid;
        gap: 12px;
      }

      .task-composer-grid textarea {
        min-height: 40px;
      }

      .task-button-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .editor-panel #doc-body {
        height: 56vh;
        min-height: 120px;
      }

      .compact-field {
        display: grid;
        gap: 6px;
      }

      .compact-field label {
        margin-bottom: 0;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .detail-note,
      .diff {
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: auto;
      }

      .detail-note {
        padding: 12px;
        background: var(--panel-soft);
        max-height: 160px;
      }

      .detail-note.success {
        border-color: rgba(26, 127, 55, 0.25);
        background: rgba(26, 127, 55, 0.06);
      }

      .detail-note.warn {
        border-color: rgba(154, 103, 0, 0.25);
        background: rgba(154, 103, 0, 0.06);
      }

      .detail-note.error {
        border-color: rgba(207, 34, 46, 0.25);
        background: rgba(207, 34, 46, 0.06);
      }

      .detail-note strong {
        display: block;
        margin-bottom: 6px;
      }

      .detail-note code {
        display: block;
        margin-top: 8px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(31, 35, 40, 0.06);
        color: var(--text);
        font-family: Consolas, monospace;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .diff {
        min-height: 120px;
        max-height: 240px;
        overflow: auto;
        background: #f6f8fa;
        color: #1f2328;
        padding: 14px;
        font-family: Consolas, monospace;
        font-size: 12px;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      details {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel-soft);
      }

      .sidebar details {
        background: var(--panel);
      }

      details summary {
        list-style: none;
        cursor: pointer;
        padding: 12px 14px;
        font-weight: 600;
      }

      details summary::-webkit-details-marker {
        display: none;
      }

      details[open] summary {
        border-bottom: 1px solid var(--line);
      }

      .details-body {
        padding: 14px;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(31, 35, 40, 0.52);
      }

      .modal-backdrop.hidden {
        display: none;
      }

      .modal-card {
        width: min(420px, 100%);
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel);
        box-shadow: 0 18px 44px rgba(31, 35, 40, 0.18);
        padding: 20px;
      }

      .modal-card h2 {
        margin: 0;
        font-size: 20px;
      }

      .modal-card p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      @media (max-width: 1200px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .editor-panel #doc-body {
          height: 58vh;
        }

        .task-list,
        .version-list {
          max-height: none;
        }
      }

      @media (max-width: 860px) {
        .doc-switcher,
        .doc-toolbar,
        .task-actions,
        .inline-actions,
        .modal-actions {
          align-items: stretch;
        }

        .doc-switcher .doc-switcher-actions,
        .doc-switcher {
          grid-template-columns: 1fr;
        }

        .doc-switcher .doc-switcher-actions,
        .doc-switcher > div,
        .doc-toolbar button,
        .task-actions button,
        .inline-actions button,
        .modal-actions button {
          width: 100%;
          min-width: 0;
        }

        .task-button-row {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        .app-shell {
          padding: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div id="key-modal" class="modal-backdrop hidden">
      <section class="modal-card" aria-labelledby="key-modal-title" aria-modal="true" role="dialog">
        <div class="stack" style="gap: 14px">
          <div>
            <h2 id="key-modal-title">连接设置</h2>
            <p>输入共享 API Key。页面只会保存在当前浏览器本地。</p>
          </div>
          <div>
            <label for="api-key">API Key</label>
            <input id="api-key" type="password" placeholder="输入共享 API Key" />
          </div>
          <div class="modal-actions">
            <button id="save-key" class="primary">保存并继续</button>
            <button id="close-key" class="secondary">稍后再说</button>
          </div>
        </div>
      </section>
    </div>

    <main class="app-shell">
      <div class="app-frame">
        <header class="app-header">
          <div class="brand">
            <h1>AgentDocs</h1>
            <p>主区域只保留文档工作台，左侧集中处理任务和版本。</p>
          </div>
          <div class="inline-actions">
            <span id="key-state" class="pill">未设置 API Key</span>
            <button id="open-key-modal">连接设置</button>
            <button id="refresh-current">刷新当前</button>
          </div>
        </header>

        <div id="status" class="status">等待连接。</div>

        <section class="workspace">
          <aside class="sidebar">
            <section class="panel">
              <div class="panel-body stack">
                <div class="section-header">
                  <div class="section-title">
                    <h2>任务动作</h2>
                    <p>选中文本后，从这里发起处理。</p>
                  </div>
                  <span id="selection-info" class="pill">尚未选择文本</span>
                </div>

                <div class="task-composer-grid">
                  <div>
                    <label for="task-action">任务动作</label>
                    <select id="task-action">
                      <option value="rewrite">rewrite</option>
                      <option value="summarize">summarize</option>
                      <option value="expand">expand</option>
                      <option value="translate">translate</option>
                      <option value="custom">custom</option>
                    </select>
                  </div>
                  <div>
                    <label for="task-instruction">补充说明</label>
                    <textarea id="task-instruction" rows="1" placeholder="例如：改成更正式的项目说明"></textarea>
                  </div>
                  <div class="task-button-row">
                    <button id="create-task" class="primary">创建任务</button>
                    <button id="cleanup-stale" class="secondary">清理失效</button>
                    <button id="clear-instruction" class="secondary">清空说明</button>
                  </div>
                </div>
              </div>
            </section>

            <section class="panel">
              <div class="panel-body stack">
                <div class="section-header">
                  <div class="section-title">
                    <h2>任务处理</h2>
                    <p>按需查看和确认结果。</p>
                  </div>
                  <span id="task-count-pill" class="pill">任务 0</span>
                </div>

                <div>
                  <select id="task-list">
                    <option value="">先选择文档</option>
                  </select>
                </div>

                <div class="section-header" style="margin-top: 8px;">
                  <span id="diff-state" class="pill">未选择任务</span>
                </div>
                
                <div id="task-summary" class="detail-note">
                  <strong>操作建议</strong>
                  <div>选择任务后，这里会说明当前状态和建议动作。</div>
                </div>
                <div id="task-actions" class="task-actions"></div>
                <div id="task-diff" class="diff">这里会显示任务 source_text 到 result 的 unified diff。</div>
              </div>
            </section>

            <section class="panel">
              <div class="panel-body stack">
                <details id="version-details">
                  <summary>版本历史</summary>
                  <div class="details-body stack">
                    <div class="section-header">
                      <div class="section-title">
                        <h3>历史版本</h3>
                        <p>只在需要回滚时展开。</p>
                      </div>
                      <span id="version-count-pill" class="pill">版本 0</span>
                    </div>
                    <div id="version-list" class="version-list"></div>
                  </div>
                </details>
              </div>
            </section>
          </aside>

          <section class="editor-column">
            <section class="panel editor-panel">
              <div class="panel-body stack">
                <div class="panel-header">
                  <div class="section-title">
                    <h2>文档工作台</h2>
                    <p>这是核心写作区，文档选择和新建也在这里完成。</p>
                  </div>
                  <span id="doc-revision-pill" class="pill">未选择文档</span>
                </div>

                <div class="doc-switcher">
                  <div class="compact-field">
                    <label class="visually-hidden" for="doc-selector">已有文档</label>
                    <select id="doc-selector">
                      <option value="">请选择文档</option>
                    </select>
                  </div>
                  <div class="compact-field">
                    <label class="visually-hidden" for="new-title">新建文档</label>
                    <input id="new-title" placeholder="输入新文档标题后创建" />
                  </div>
                  <div class="doc-switcher-actions inline-actions">
                    <button id="create-doc" class="primary">新建</button>
                  </div>
                </div>

                <div>
                  <label for="doc-title">标题</label>
                  <input id="doc-title" placeholder="未选择文档" />
                </div>

                <div class="doc-toolbar">
                  <span class="pill">常用动作</span>
                  <button id="save-doc" class="primary">保存文档</button>
                  <button id="delete-doc" class="danger">删除文档</button>
                </div>

                <div>
                  <label for="doc-body">Markdown</label>
                  <textarea id="doc-body" placeholder="# 开始写文档"></textarea>
                </div>
              </div>
            </section>
          </section>
        </section>
      </div>
    </main>

    <script>
      const state = {
        docId: null,
        revision: null,
        selectedTaskId: null,
      };

      const statusEl = document.getElementById("status");
      const apiKeyInput = document.getElementById("api-key");
      const keyModalEl = document.getElementById("key-modal");
      const keyStateEl = document.getElementById("key-state");
      const docRevisionPillEl = document.getElementById("doc-revision-pill");
      const docSelectorEl = document.getElementById("doc-selector");
      const selectionInfoEl = document.getElementById("selection-info");
      const docTitleInput = document.getElementById("doc-title");
      const docBodyInput = document.getElementById("doc-body");
      const taskListEl = document.getElementById("task-list");
      const taskCountPillEl = document.getElementById("task-count-pill");
      const taskSummaryEl = document.getElementById("task-summary");
      const taskActionsEl = document.getElementById("task-actions");
      const diffEl = document.getElementById("task-diff");
      const diffStateEl = document.getElementById("diff-state");
      const versionListEl = document.getElementById("version-list");
      const versionCountPillEl = document.getElementById("version-count-pill");

      apiKeyInput.value = localStorage.getItem("agentdocs.apiKey") || "";

      function setStatus(message, mode = "") {
        statusEl.textContent = message;
        statusEl.className = `status ${mode}`.trim();
      }

      function syncKeyState() {
        keyStateEl.textContent = apiKeyInput.value.trim() ? "API Key 已保存" : "未设置 API Key";
      }

      function openKeyModal() {
        keyModalEl.classList.remove("hidden");
        setTimeout(() => apiKeyInput.focus(), 0);
      }

      function closeKeyModal() {
        if (!apiKeyInput.value.trim()) {
          return;
        }
        keyModalEl.classList.add("hidden");
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function renderEmpty(container, message, title = "") {
        const heading = title ? `<h4>${escapeHtml(title)}</h4>` : "";
        container.innerHTML = `<div class="card">${heading}<p class="hint">${escapeHtml(message)}</p></div>`;
      }

      function clearEditor() {
        state.docId = null;
        state.revision = null;
        state.selectedTaskId = null;
        docRevisionPillEl.textContent = "未选择文档";
        docSelectorEl.innerHTML = '<option value="">请选择文档</option>';
        docSelectorEl.value = "";
        docTitleInput.value = "";
        docBodyInput.value = "";
        updateSelectionInfo();
        taskListEl.innerHTML = '<option value="">先选择文档</option>';
        renderEmpty(versionListEl, "先选择文档。", "版本列表");
        resetTaskDetails();
        taskCountPillEl.textContent = "任务 0";
        versionCountPillEl.textContent = "版本 0";
      }

      function setTaskSummary(title, message, mode = "", details = []) {
        const detailHtml = details
          .filter(Boolean)
          .map((value) => `<code>${escapeHtml(value)}</code>`)
          .join("");
        taskSummaryEl.className = `detail-note ${mode}`.trim();
        taskSummaryEl.innerHTML = `
          <strong>${escapeHtml(title)}</strong>
          <div>${escapeHtml(message)}</div>
          ${detailHtml}
        `;
      }

      function resetTaskDetails() {
        state.selectedTaskId = null;
        diffStateEl.textContent = "未选择任务";
        taskActionsEl.innerHTML = "";
        diffEl.textContent = "这里会显示任务 source_text 到 result 的 unified diff。";
        setTaskSummary("操作建议", "选择任务后，这里会说明当前状态和建议动作。");
      }

      function buildFriendlyError(code, message) {
        const detail = message ? ` 细节：${message}` : "";
        if (code === "conflict") {
          return `正文和任务源文本已经不一致。可以先清理失效任务，或手动检查后再决定是否重建任务。${detail}`;
        }
        if (code === "validation_error") {
          return `请求未通过校验。请检查当前选区、revision 或任务状态。${detail}`;
        }
        if (code === "invalid_state") {
          return `当前状态不允许这个操作。请先刷新当前文档和任务状态。${detail}`;
        }
        if (code === "unauthorized") {
          openKeyModal();
          return "API Key 无效，请重新输入并保存。";
        }
        return message || "请求失败";
      }

      function describeConflictReason(reason) {
        if (reason === "selection_removed") {
          return "原始选区已经被删掉，旧任务不能再直接合并。";
        }
        if (reason === "selection_shifted") {
          return "原始选区长度已经变化，说明正文结构被改过。";
        }
        if (reason === "source_changed") {
          return "原始选区内容已经变化，旧任务结果需要重新核对。";
        }
        return "当前正文已经变化，旧任务结果不能直接套用。";
      }

      function describeTaskStatusText(task) {
        if (task.is_stale && task.status === "rejected") {
          return "失效任务已关闭";
        }
        if (task.is_stale && task.status === "cancelled") {
          return "失效任务已取消";
        }
        if (task.is_stale) {
          return `失效任务 · 建议 ${task.recommended_action || "重建"}`;
        }
        return `状态：${task.status}`;
      }

      function describeResolvedTask(task) {
        if (task.status === 'accepted') {
          return '该任务已经接受完成，仅保留结果对照。';
        }
        if (task.status === 'rejected') {
          return '该任务已经明确拒绝，不会再自动影响正文。';
        }
        return '该任务已结束，仅展示当前结果记录。';
      }

      function getHeaders() {
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) {
          openKeyModal();
          throw new Error("请先设置 API Key");
        }
        return {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${apiKey}`,
        };
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          ...options,
          headers: {
            ...(options.body ? { 'Content-Type': 'application/json' } : {}),
            Authorization: getHeaders().Authorization,
            ...(options.headers || {}),
          },
        });
        const payload = await response.json();
        if (!response.ok || payload.ok === false) {
          throw new Error(buildFriendlyError(payload.error?.code, payload.error?.message));
        }
        return payload.data;
      }

      function renderDocOptions(docs) {
        if (!docs.length) {
          docSelectorEl.innerHTML = '<option value="">暂无文档</option>';
          docSelectorEl.value = '';
          return;
        }
        docSelectorEl.innerHTML = docs
          .map(
            (doc) => `<option value="${doc.id}">${escapeHtml(doc.title)} · rev ${doc.revision}</option>`
          )
          .join('');
        docSelectorEl.value = state.docId ? String(state.docId) : String(docs[0].id);
      }

      async function loadDocs() {
        const docs = await api('/api/docs');
        if (!docs.length) {
          clearEditor();
          return;
        }
        if (!state.docId || !docs.some((doc) => doc.id === state.docId)) {
          state.docId = docs[0].id;
        }
        renderDocOptions(docs);
        await selectDoc(state.docId, { refreshDocs: false });
      }

      async function loadDocsOnly() {
        const docs = await api('/api/docs');
        if (!docs.length) {
          clearEditor();
          return;
        }
        if (!state.docId || !docs.some((doc) => doc.id === state.docId)) {
          state.docId = docs[0].id;
        }
        renderDocOptions(docs);
      }

      async function selectDoc(docId, options = { refreshDocs: true }) {
        if (!docId) {
          clearEditor();
          return;
        }
        const doc = await api(`/api/docs/${docId}`);
        state.docId = doc.id;
        state.revision = doc.revision;
        state.selectedTaskId = null;
        docRevisionPillEl.textContent = `revision ${doc.revision}`;
        docSelectorEl.value = String(doc.id);
        docTitleInput.value = doc.title;
        docBodyInput.value = doc.raw_markdown;
        updateSelectionInfo();
        resetTaskDetails();
        if (options.refreshDocs) {
          await loadDocsOnly();
        }
        await Promise.all([loadTasks(), loadVersions()]);
        setStatus(`已加载文档 #${doc.id}，当前 revision ${doc.revision}。`, 'success');
      }

      async function loadTasks() {
        if (!state.docId) {
          taskCountPillEl.textContent = '任务 0';
          taskListEl.innerHTML = '<option value="">先选择文档</option>';
          resetTaskDetails();
          return;
        }
        const tasks = await api(`/api/tasks?doc_id=${state.docId}`);
        taskCountPillEl.textContent = `任务 ${tasks.length}`;
        if (!tasks.length) {
          taskListEl.innerHTML = '<option value="">当前文档无任务</option>';
          resetTaskDetails();
          return;
        }
        if (state.selectedTaskId && !tasks.some((task) => task.id === state.selectedTaskId)) {
          resetTaskDetails();
        }
        taskListEl.innerHTML = tasks
          .map((task) => {
            const status = describeTaskStatusText(task);
            return `<option value="${task.id}">#${task.id} ${escapeHtml(task.action)} (${status})</option>`;
          })
          .join('');

        taskListEl.value = state.selectedTaskId ? String(state.selectedTaskId) : String(tasks[0].id);

        if (!state.selectedTaskId && tasks.length > 0) {
          await selectTask(tasks[0].id);
        }
      }

      async function loadVersions() {
        if (!state.docId) {
          versionCountPillEl.textContent = '版本 0';
          renderEmpty(versionListEl, '先选择文档。', '版本列表');
          return;
        }
        const versions = await api(`/api/docs/${state.docId}/versions`);
        versionCountPillEl.textContent = `版本 ${versions.length}`;
        if (!versions.length) {
          renderEmpty(versionListEl, '暂无版本。', '版本列表');
          return;
        }
        versionListEl.innerHTML = versions
          .map(
            (version) => `
              <div class="card">
                <h4>revision ${version.revision}</h4>
                <div class="meta">${escapeHtml(version.note || '无备注')}</div>
                <div class="meta">${escapeHtml(version.actor)}</div>
                <div class="inline-actions" style="margin-top: 10px">
                  <button class="secondary" data-version-id="${version.id}">回滚到这里</button>
                </div>
              </div>
            `
          )
          .join('');
        versionListEl.querySelectorAll('[data-version-id]').forEach((button) => {
          button.addEventListener('click', () => rollbackVersion(Number(button.dataset.versionId)));
        });
      }

      function buildActionButton(label, handler, className = '') {
        const button = document.createElement('button');
        button.textContent = label;
        if (className) {
          button.className = className;
        }
        button.addEventListener('click', handler);
        return button;
      }

      async function selectTask(taskId) {
        state.selectedTaskId = taskId;
        const task = await api(`/api/tasks/${taskId}`);
        await loadTasks();
        taskActionsEl.innerHTML = '';

        if (['done', 'accepted', 'rejected'].includes(task.status) && task.result) {
          const diff = await api(`/api/tasks/${taskId}/diff`);
          if (task.status === 'done' && diff.can_accept) {
            diffStateEl.textContent = '可以 accept';
            setTaskSummary(
              '可以直接接受',
              '当前正文仍与任务源文本一致，accept 会把选中区间替换成任务结果。',
              'success',
              [`当前文本: ${diff.current_text}`, `任务结果: ${diff.result_text}`]
            );
          } else if (task.status === 'done') {
            diffStateEl.textContent = '存在冲突';
            setTaskSummary(
              '建议先清理或重建任务',
              describeConflictReason(diff.conflict_reason),
              'warn',
              [
                `原始文本: ${diff.source_text}`,
                `当前文本: ${diff.current_text}`,
                `任务结果: ${diff.result_text}`,
              ]
            );
          } else {
            diffStateEl.textContent = `状态：${task.status}`;
            setTaskSummary(
              task.status === 'accepted' ? '任务已接受' : '任务已拒绝',
              describeResolvedTask(task),
              task.status === 'accepted' ? 'success' : 'warn',
              [
                `原始文本: ${diff.source_text}`,
                `任务结果: ${diff.result_text}`,
              ]
            );
          }
          diffEl.textContent = diff.diff || 'source_text 与 result 只有单行差异，没有额外上下文。';
        } else {
          diffStateEl.textContent = task.is_stale ? '任务已失效' : `状态：${task.status}`;
          diffEl.textContent = task.error_message || '该任务当前没有可展示的 diff。';
          if (task.status === 'failed') {
            setTaskSummary(
              'Agent 处理失败',
              task.is_stale
                ? `${describeConflictReason(task.stale_reason)} 旧任务通常不值得重试，建议重新创建。`
                : '这次任务没有产出结果。确认后可以直接 retry。',
              'error',
              [task.error_message || '没有额外错误信息']
            );
          } else if (task.status === 'pending' || task.status === 'processing') {
            setTaskSummary(
              task.is_stale ? '建议关闭这个失效任务' : '任务仍在处理中',
              task.is_stale
                ? `${describeConflictReason(task.stale_reason)} 推荐先取消，再按当前正文重新建任务。`
                : '当前还不能 accept 或 reject。若 Agent 卡住，可以先 cancel。',
              task.is_stale ? 'warn' : '',
              [task.source_text]
            );
          } else if (task.status === 'cancelled') {
            setTaskSummary(
              '任务已取消',
              task.is_stale
                ? '源文本已经变了，这条旧任务已安全关闭，只保留记录。'
                : '当前结果不会改写正文。若原始文本仍匹配，可以 retry。',
              'warn',
              [task.source_text]
            );
          } else {
            setTaskSummary(
              task.is_stale ? '旧任务已失效' : '当前没有可接受结果',
              task.is_stale
                ? `${describeConflictReason(task.stale_reason)} 可以直接清理这条任务，或在当前正文上重新建一条。`
                : '这个任务现在没有可直接合并到文档的结果。',
              task.is_stale ? 'warn' : '',
              [task.source_text]
            );
          }
        }

        if (task.status === 'done') {
          taskActionsEl.append(buildActionButton('接受结果', () => acceptTask(taskId), 'primary'));
          taskActionsEl.append(
            buildActionButton(task.is_stale ? '标记失效' : '拒绝结果', () => rejectTask(taskId), task.is_stale ? 'warn' : 'secondary')
          );
        }
        if (['pending', 'processing'].includes(task.status)) {
          taskActionsEl.append(
            buildActionButton(task.is_stale ? '关闭失效任务' : '取消任务', () => cancelTask(taskId), task.is_stale ? 'warn' : 'secondary')
          );
        }
        if (['failed', 'cancelled', 'rejected'].includes(task.status) && !task.is_stale) {
          taskActionsEl.append(buildActionButton('重新排队', () => retryTask(taskId), 'secondary'));
        }
        if (task.is_stale) {
          taskActionsEl.append(buildActionButton('清理当前文档失效任务', cleanupStaleTasks, 'secondary'));
        }
      }

      async function createDoc() {
        const title = document.getElementById('new-title').value.trim();
        if (!title) {
          throw new Error('请先输入文档标题');
        }
        const doc = await api('/api/docs', {
          method: 'POST',
          body: JSON.stringify({ title, raw_markdown: `# ${title}\n`, actor: 'browser' }),
        });
        document.getElementById('new-title').value = '';
        await loadDocsOnly();
        await selectDoc(doc.id, { refreshDocs: false });
      }

      async function saveDoc() {
        if (!state.docId) {
          throw new Error('请先选择文档');
        }
        const previousRevision = state.revision;
        const doc = await api(`/api/docs/${state.docId}`, {
          method: 'PUT',
          body: JSON.stringify({
            title: docTitleInput.value,
            raw_markdown: docBodyInput.value,
            expected_revision: state.revision,
            actor: 'browser',
            note: 'manual edit from ui',
          }),
        });
        state.revision = doc.revision;
        docRevisionPillEl.textContent = `revision ${doc.revision}`;
        setStatus(
          doc.revision === previousRevision
            ? '正文没有变化，没有创建新版本。'
            : `文档已保存到 revision ${doc.revision}。`,
          'success'
        );
        await Promise.all([loadDocsOnly(), loadTasks(), loadVersions()]);
      }

      async function deleteDoc() {
        if (!state.docId) {
          throw new Error('请先选择文档');
        }
        const confirmed = window.confirm('删除后文档、任务和版本记录都会一并移除。确认删除吗？');
        if (!confirmed) {
          return;
        }
        const deletedId = state.docId;
        await api(`/api/docs/${state.docId}`, { method: 'DELETE' });
        clearEditor();
        await loadDocs();
        setStatus(`文档 #${deletedId} 已删除。`, 'success');
      }

      async function cleanupStaleTasks() {
        if (!state.docId) {
          throw new Error('请先选择文档');
        }
        const result = await api(`/api/docs/${state.docId}/tasks/cleanup-stale`, {
          method: 'POST',
        });
        state.selectedTaskId = null;
        await loadTasks();
        setStatus(
          `已清理失效任务：取消 ${result.cancelled}，关闭 ${result.rejected}，保留 ${result.unchanged}。`,
          'success'
        );
      }

      async function createTask() {
        if (!state.docId) {
          throw new Error('请先选择文档');
        }
        const start = docBodyInput.selectionStart;
        const end = docBodyInput.selectionEnd;
        if (start === end) {
          throw new Error('请先在编辑区选中文本');
        }
        const sourceText = docBodyInput.value.slice(start, end);
        await api(`/api/docs/${state.docId}/tasks`, {
          method: 'POST',
          body: JSON.stringify({
            action: document.getElementById('task-action').value,
            instruction: document.getElementById('task-instruction').value || null,
            source_text: sourceText,
            start_offset: start,
            end_offset: end,
            doc_revision: state.revision,
          }),
        });
        await loadTasks();
        setStatus('任务已创建，等待 Agent 处理。', 'success');
      }

      async function acceptTask(taskId) {
        const task = await api(`/api/tasks/${taskId}/accept`, {
          method: 'POST',
          body: JSON.stringify({
            expected_revision: state.revision,
            actor: 'browser',
            note: 'accept from ui',
          }),
        });
        setStatus(`任务 #${taskId} 已 accept。`, 'success');
        await selectDoc(task.doc_id);
        await selectTask(taskId);
      }

      async function rejectTask(taskId) {
        await api(`/api/tasks/${taskId}/reject`, { method: 'POST' });
        setStatus(`任务 #${taskId} 已关闭。`, 'success');
        await loadTasks();
        await selectTask(taskId);
      }

      async function cancelTask(taskId) {
        await api(`/api/tasks/${taskId}/cancel`, { method: 'POST' });
        setStatus(`任务 #${taskId} 已取消。`, 'success');
        await loadTasks();
        await selectTask(taskId);
      }

      async function retryTask(taskId) {
        await api(`/api/tasks/${taskId}/retry`, { method: 'POST' });
        setStatus(`任务 #${taskId} 已重置为 pending。`, 'success');
        await loadTasks();
        await selectTask(taskId);
      }

      async function rollbackVersion(versionId) {
        if (!state.docId) {
          throw new Error('请先选择文档');
        }
        const doc = await api(`/api/docs/${state.docId}/versions/${versionId}/rollback`, {
          method: 'POST',
          body: JSON.stringify({
            expected_revision: state.revision,
            actor: 'browser',
            note: `rollback from ui to version ${versionId}`,
          }),
        });
        state.revision = doc.revision;
        docRevisionPillEl.textContent = `revision ${doc.revision}`;
        docTitleInput.value = doc.title;
        docBodyInput.value = doc.raw_markdown;
        updateSelectionInfo();
        resetTaskDetails();
        setStatus(`已回滚到版本 #${versionId}，当前 revision ${doc.revision}。`, 'success');
        await Promise.all([loadDocsOnly(), loadTasks(), loadVersions()]);
      }

      async function refreshCurrent() {
        if (state.docId) {
          await selectDoc(state.docId);
          return;
        }
        await loadDocs();
      }

      function updateSelectionInfo() {
        const start = docBodyInput.selectionStart;
        const end = docBodyInput.selectionEnd;
        if (start === end) {
          selectionInfoEl.textContent = '尚未选择文本';
          return;
        }
        selectionInfoEl.textContent = `选区 ${start}-${end}，长度 ${end - start}`;
      }

      async function safeRun(callback) {
        try {
          await callback();
        } catch (error) {
          setStatus(error.message || '发生错误', 'error');
        }
      }

      document.getElementById('open-key-modal').addEventListener('click', openKeyModal);
      document.getElementById('close-key').addEventListener('click', closeKeyModal);
      document.getElementById('save-key').addEventListener('click', () => {
        const value = apiKeyInput.value.trim();
        if (!value) {
          setStatus('请先输入 API Key。', 'error');
          return;
        }
        localStorage.setItem('agentdocs.apiKey', value);
        syncKeyState();
        keyModalEl.classList.add('hidden');
        setStatus('API Key 已保存到本地浏览器。', 'success');
      });
      document.getElementById('refresh-current').addEventListener('click', () => safeRun(refreshCurrent));
      document.getElementById('create-doc').addEventListener('click', () => safeRun(createDoc));
      document.getElementById('save-doc').addEventListener('click', () => safeRun(saveDoc));
      document.getElementById('cleanup-stale').addEventListener('click', () => safeRun(cleanupStaleTasks));
      document.getElementById('clear-instruction').addEventListener('click', () => {
        document.getElementById('task-instruction').value = '';
      });
      document.getElementById('delete-doc').addEventListener('click', () => safeRun(deleteDoc));
      document.getElementById('create-task').addEventListener('click', () => safeRun(createTask));
      docSelectorEl.addEventListener('change', () => safeRun(() => selectDoc(Number(docSelectorEl.value))));
      taskListEl.addEventListener('change', () => {
        if (!taskListEl.value) {
          resetTaskDetails();
          return;
        }
        safeRun(() => selectTask(Number(taskListEl.value)));
      });
      docBodyInput.addEventListener('select', updateSelectionInfo);
      docBodyInput.addEventListener('keyup', updateSelectionInfo);
      docBodyInput.addEventListener('mouseup', updateSelectionInfo);

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && !keyModalEl.classList.contains('hidden')) {
          closeKeyModal();
        }
      });

      syncKeyState();
      clearEditor();
      if (!apiKeyInput.value.trim()) {
        openKeyModal();
      }
      safeRun(loadDocs);
    </script>
  </body>
</html>
